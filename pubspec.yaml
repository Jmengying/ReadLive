name: readlive
description: A local-first novel reader app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  go_router: ^14.6.2
  epubx: ^4.0.0
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  path: ^1.9.0
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  json_annotation: ^4.9.0
  sqlite3: ^2.7.3
  dio: ^5.7.0
  beautiful_soup_dart: ^0.3.0
  flutter_tts: ^4.2.2
  wakelock_plus: ^1.2.10
  archive: ^3.6.1
  syncfusion_flutter_pdf: ^27.1.48
  fl_chart: ^0.69.0
  xpath_selector: ^3.0.0
  xpath_selector_html_parser: ^3.0.0
  json_path: ^0.7.6
  flutter_js: ^0.8.0
  gbk_codec: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.2
  drift_dev: ^2.22.1
  json_serializable: ^6.9.2
  freezed_annotation: ^2.4.4
  freezed: ^2.5.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/
